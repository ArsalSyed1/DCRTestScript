name: Cypress Tests

on:
  push:
    branches: 
      - '**'
  pull_request:
    branches: 
      - '**'
  schedule:
  - cron: '0 19 * * *'  # 12:00 AM PKT
  - cron: '0 22 * * *'  # 3:00 AM PKT
  - cron: '0 0 * * *'   # 5:00 AM PKT

jobs:
  cypress-run:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npx cypress run --e2e --browser chrome --env ENV=demo

        # Running on self-hosted machine