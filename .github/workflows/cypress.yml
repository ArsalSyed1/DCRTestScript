name: Cypress Tests

on:
  push:
    branches: 
      - '**'
  pull_request:
    branches: 
      - '**'
  schedule:
  - cron: '0 19 * * *'  # 12:00 AM PKT
  - cron: '0 22 * * *'  # 3:00 AM PKT
  - cron: '0 0 * * *'   # 5:00 AM PKT

jobs:
  cypress-run:
    runs-on: ubuntu-latest #self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npx cypress run --e2e --browser chrome --env ENV=demo

      # ✅ Upload screenshots (ONLY if tests fail)
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-debug-logs
          path: cypress/logs